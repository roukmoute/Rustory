# Local developer tooling only — not a runtime/production contract.
#
# The `rust-dev` service runs Rust + Tauri v2 build commands (check, test,
# clippy) in a container that carries the Linux system deps required by the
# `src-tauri` crate. This keeps contributor hosts free of the GTK / WebKitGTK
# toolchain while still letting `cargo test` produce real results.
#
# The `tauri-dev` service uses the same native toolchain plus Node/pnpm to run
# the desktop app through X11 without installing GTK/WebKitGTK headers on the
# host.
#
# Typical usage:
#   docker compose run --rm rust-dev cargo test
#   docker compose run --rm rust-dev cargo check --tests
#   docker compose run --rm rust-dev cargo clippy --all-targets
#   docker compose run --rm -e DISPLAY tauri-dev
#
# Frontend (Vitest / pnpm) keeps running on the host — see README.

services:
  rust-dev:
    build:
      context: .
      dockerfile: docker/Dockerfile.rust-dev
      target: rust-dev
    image: rustory-rust-dev:local
    working_dir: /workspace/src-tauri
    volumes:
      - .:/workspace
      - rustory-cargo-registry:/usr/local/cargo/registry
      - rustory-cargo-git:/usr/local/cargo/git
      - rustory-cargo-target:/workspace/src-tauri/target
    # Run interactively by default — override with `docker compose run` to
    # pass arbitrary cargo subcommands.
    command: ["cargo", "test"]

  tauri-dev:
    build:
      context: .
      dockerfile: docker/Dockerfile.rust-dev
      target: tauri-dev
    image: rustory-tauri-dev:local
    working_dir: /workspace
    environment:
      DISPLAY: ${DISPLAY}
      NO_AT_BRIDGE: "1"
      # Tell the device scanner to probe the host's USB auto-mount
      # roots that sysinfo cannot see from inside the container's
      # mount namespace. The scanner reads this colon-separated path
      # list and additionally probes one level of children — so a
      # Lunii mounted at `/media/$USER/<volume>` is picked up.
      RUSTORY_DEVICE_MOUNT_ROOTS: /media:/run/media
    volumes:
      - .:/workspace
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - rustory-cargo-registry:/usr/local/cargo/registry
      - rustory-cargo-git:/usr/local/cargo/git
      - rustory-cargo-target:/workspace/src-tauri/target
      # Persist the Tauri `app_data_dir` across ephemeral `docker compose run`
      # invocations. Without this volume every restart spawns a fresh container
      # whose `~/.local/share` is empty, so SQLite drafts never survive. The
      # named volume keeps `rustory.sqlite` on the host Docker engine between
      # sessions while staying scoped to this service.
      - rustory-app-data:/root/.local/share
      # Expose the host's udisks2 auto-mount roots so the device scan can
      # see USB Mass Storage volumes (Lunii, etc.) plugged into the
      # host. Read-only by intent: Rustory only needs to enumerate and
      # read marker files in MVP Phase 1; any future write to the device
      # will be revisited at Epic 3 wire-time and require an explicit
      # rebind to `rw`.
      #
      # `rslave` propagation: host mount events (USB plug / unplug
      # triggering udisks-managed mounts under /media/$USER/<volume>)
      # propagate into the container so a Lunii unplugged and replugged
      # after container start is detected. Without rslave the container
      # only sees the mount tree at startup and stays blind to later
      # plug events.
      - /media:/media:ro,rslave
      - /run/media:/run/media:ro,rslave
    devices:
      - /dev/dri:/dev/dri
    command: ["pnpm", "tauri", "dev"]

volumes:
  rustory-cargo-registry:
  rustory-cargo-git:
  rustory-cargo-target:
  rustory-app-data:
